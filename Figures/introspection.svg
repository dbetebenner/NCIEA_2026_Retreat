<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="On the left, a scattered cloud of app names. An arrow labeled 'what am I actually doing?' points right to five named, connected steps: gather, analyze, draft, review, share.">
  <defs>
    <style>
      .lbl { font-family: 'Noto Sans', system-ui, sans-serif; }
      .ttl { font-family: 'Josefin Sans', system-ui, sans-serif; }
    </style>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8e44ad"/>
    </marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3498DB"/>
    </marker>
  </defs>
  <rect width="1000" height="480" fill="rgb(237,237,235)"/>

  <!-- LEFT: scattered cloud -->
  <text x="205" y="52" text-anchor="middle" class="ttl" font-size="22" font-weight="600" fill="#7c7c7c">A sea of apps</text>
  <g class="lbl" font-size="17" fill="rgb(20,20,16)" text-anchor="middle">
    <g transform="rotate(-8 120 120)"><rect x="70" y="100" width="110" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="125" y="126">Outlook</text></g>
    <g transform="rotate(6 300 130)"><rect x="240" y="110" width="96" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="288" y="136">Excel</text></g>
    <g transform="rotate(-5 160 210)"><rect x="96" y="190" width="110" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="151" y="216">Chrome</text></g>
    <g transform="rotate(9 320 235)"><rect x="262" y="215" width="96" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="310" y="241">Word</text></g>
    <g transform="rotate(-7 150 315)"><rect x="92" y="295" width="110" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="147" y="321">Teams</text></g>
    <g transform="rotate(5 310 330)"><rect x="256" y="310" width="108" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="310" y="336">R / SGP</text></g>
    <g transform="rotate(-4 205 400)"><rect x="150" y="382" width="110" height="40" rx="8" fill="#fff" stroke="#dcdcda"/><text x="205" y="408">Slides</text></g>
  </g>

  <!-- ARROW / question -->
  <line x1="392" y1="240" x2="556" y2="240" stroke="#8e44ad" stroke-width="3" marker-end="url(#a2)"/>
  <text x="474" y="220" text-anchor="middle" class="ttl" font-size="19" font-weight="600" fill="#8e44ad">what am I</text>
  <text x="474" y="290" text-anchor="middle" class="ttl" font-size="19" font-weight="600" fill="#8e44ad">actually doing?</text>

  <!-- RIGHT: named components -->
  <text x="792" y="52" text-anchor="middle" class="ttl" font-size="22" font-weight="600" fill="#3498DB">Named components</text>
  <g class="lbl" font-size="19" text-anchor="middle" fill="rgb(20,20,16)">
    <g><rect x="600" y="86" width="384" height="52" rx="10" fill="#fff" stroke="#3498DB" stroke-width="2"/><text x="792" y="119">1 · Gather the data &amp; context</text></g>
    <g><rect x="600" y="162" width="384" height="52" rx="10" fill="#fff" stroke="#3498DB" stroke-width="2"/><text x="792" y="195">2 · Analyze</text></g>
    <g><rect x="600" y="238" width="384" height="52" rx="10" fill="#fff" stroke="#3498DB" stroke-width="2"/><text x="792" y="271">3 · Draft the write-up</text></g>
    <g><rect x="600" y="314" width="384" height="52" rx="10" fill="#fff" stroke="#3498DB" stroke-width="2"/><text x="792" y="347">4 · Review &amp; check</text></g>
    <g><rect x="600" y="390" width="384" height="52" rx="10" fill="#fff" stroke="#3498DB" stroke-width="2"/><text x="792" y="423">5 · Share</text></g>
  </g>
  <g stroke="#3498DB" stroke-width="2.5" fill="none" marker-end="url(#a3)" opacity="0.8">
    <line x1="792" y1="138" x2="792" y2="158"/>
    <line x1="792" y1="214" x2="792" y2="234"/>
    <line x1="792" y1="290" x2="792" y2="310"/>
    <line x1="792" y1="366" x2="792" y2="386"/>
  </g>
</svg>
