<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-label="A person at the center connected by tangled lines to many apps and two devices, illustrating manual human-in-the-loop coordination.">
  <defs>
    <style>
      .lbl { font-family: 'Noto Sans', system-ui, sans-serif; }
      .ttl { font-family: 'Josefin Sans', system-ui, sans-serif; }
    </style>
  </defs>
  <rect width="1000" height="560" fill="rgb(237,237,235)"/>

  <!-- connecting lines (drawn first, behind chips) -->
  <g stroke="#7c7c7c" stroke-width="2" opacity="0.55" fill="none">
    <path d="M500 300 C 360 210, 300 170, 210 132"/>
    <path d="M500 300 C 420 200, 400 150, 470 120"/>
    <path d="M500 300 C 560 190, 640 150, 760 128"/>
    <path d="M500 300 C 620 250, 720 230, 838 214"/>
    <path d="M500 300 C 380 320, 260 320, 168 316"/>
    <path d="M500 300 C 640 330, 740 340, 842 356"/>
    <path d="M500 300 C 360 380, 300 430, 232 470"/>
    <path d="M500 300 C 470 420, 470 450, 486 486"/>
    <path d="M500 300 C 640 400, 700 440, 772 474"/>
  </g>

  <!-- app chips -->
  <g class="lbl" font-size="20" text-anchor="middle">
    <g>
      <rect x="128" y="108" width="164" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="210" y="140" fill="rgb(20,20,16)">Outlook</text>
    </g>
    <g>
      <rect x="398" y="96" width="150" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="473" y="128" fill="rgb(20,20,16)">Word</text>
    </g>
    <g>
      <rect x="686" y="104" width="150" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="761" y="136" fill="rgb(20,20,16)">Excel</text>
    </g>
    <g>
      <rect x="770" y="190" width="164" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="852" y="222" fill="rgb(20,20,16)">Chrome</text>
    </g>
    <g>
      <rect x="86" y="292" width="150" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="161" y="324" fill="rgb(20,20,16)">Teams</text>
    </g>
    <g>
      <rect x="778" y="332" width="164" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="860" y="364" fill="rgb(20,20,16)">Zoom</text>
    </g>
    <g>
      <rect x="150" y="450" width="150" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="225" y="482" fill="rgb(20,20,16)">PDFs</text>
    </g>
    <g>
      <rect x="408" y="470" width="164" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="490" y="502" fill="rgb(20,20,16)">Slides</text>
    </g>
    <g>
      <rect x="694" y="456" width="164" height="52" rx="10" fill="#fff" stroke="#dcdcda"/>
      <text x="776" y="488" fill="rgb(20,20,16)">R / stats</text>
    </g>
  </g>

  <!-- device hints -->
  <g class="lbl" font-size="15" fill="#7c7c7c" text-anchor="middle">
    <text x="500" y="46" class="ttl" font-size="22" fill="#7c7c7c">…across laptop, phone, and browser tabs</text>
  </g>

  <!-- center person -->
  <g>
    <circle cx="500" cy="300" r="66" fill="#3498DB" opacity="0.12"/>
    <circle cx="500" cy="300" r="66" fill="none" stroke="#3498DB" stroke-width="3"/>
    <circle cx="500" cy="282" r="18" fill="#3498DB"/>
    <path d="M470 332 a30 26 0 0 1 60 0 z" fill="#3498DB"/>
    <text x="500" y="378" text-anchor="middle" class="ttl" font-size="22" font-weight="600" fill="rgb(20,20,16)">You</text>
  </g>

  <!-- caption strip -->
  <text x="500" y="542" text-anchor="middle" class="ttl" font-size="24" font-weight="600" fill="#3498DB">You are the integration layer.</text>
</svg>
